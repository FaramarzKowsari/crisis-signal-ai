site_name: CrisisSignal AI
site_description: Trustworthy, multilingual and multimodal crisis-intelligence engineering and research documentation
site_author: Faramarz Kowsari
site_url: https://faramarzkowsari.github.io/crisis-signal-ai/
repo_url: https://github.com/FaramarzKowsari/crisis-signal-ai
repo_name: FaramarzKowsari/crisis-signal-ai
copyright: Copyright © 2026 Faramarz Kowsari

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Reproducibility: reproducibility.md
  - Evaluation: evaluation.md
  - Ethics and limitations: ethics.md
  - Deployment: deployment.md
  - Portfolio evidence: portfolio-evidence.md
  - DOI strategy: doi-strategy.md
  - Model card: model-card.md
  - Dataset card: dataset-card.md
  - Research roadmap: research-roadmap.md
  - Companion book: book-map.md
  - Author and verified profiles: author.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
