services:
  api:
    build: .
    environment:
      CRISIS_SIGNAL_MODEL: /app/artifacts/baseline.joblib
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
